<!DOCTYPE html>
<html itemscope="" itemtype="http://schema.org/WebPage">
    <head>
        <title>Draw Pixels</title>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
        <meta name="description" content="Pixel Editor" />
        <meta name="copyright" content="Chris Dragan" />
        <script src="app.js" type="text/javascript"></script>
        <link href="app.css" rel="stylesheet" type="text/css" />
    </head>
    <body onload="OnPageLoad();" onkeydown="editor.OnKeyDown(event);">
        <div id="toolbar">
            <span class="tool-group">
                <label>W <input type="text" id="img_width"  title="Width of one image in pixels"  value="24" size="3" maxLength="3" onchange="editor.UpdateDimensions()"></label>
                <label>H <input type="text" id="img_height" title="Height of one image in pixels" value="24" size="3" maxLength="3" onchange="editor.UpdateDimensions()"></label>
            </span>
            <span class="sep"></span>
            <input type="file" id="file-input" accept="image/png" onchange="editor.LoadFile()">
            <button onclick="document.getElementById('file-input').click()">Load</button>
            <button onclick="editor.SaveFile()">Save</button>
            <span class="sep"></span>
            <button onclick="editor.Undo()">Undo</button>
            <span class="sep"></span>
            <label>Mirror X <input type="checkbox" id="mirror_x"></label>
            <label>Mirror Y <input type="checkbox" id="mirror_y"></label>
            <span class="sep"></span>
            <span class="mode-group">
                <label><input type="radio" id="mode_draw" name="mode" value="draw" checked>Draw</label>
                <label><input type="radio" id="mode_fill" name="mode" value="fill">Fill</label>
                <label><input type="radio" id="mode_move" name="mode" value="move">Move</label>
            </span>
        </div>
        <div id="mid-container">
            <div id="palette">
            </div>
            <div id="preview-container">
                <img id="preview" alt="Actual image" title="Preview of currently edited image">
            </div>
            <div id="image-container">
                <svg id="image" xmlns="http://www.w3.org/2000/svg"
                     xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1"
                     onmousemove="editor.OnMouseMove(evt)"
                     onmousedown="editor.OnMouseDown(evt)"
                     onmouseup="editor.OnMouseUp(evt)"
                     ontouchmove="editor.OnMouseMove(evt)"
                     ontouchstart="editor.OnMouseDown(evt)"
                     ontouchend="editor.OnMouseUp(evt)"
                     onmouseleave="editor.OnMouseLeave()">
                </svg>
            </div>
        </div>
        <div id="footer">
            <div id="all-images"></div>
        </div>
    </body>
</html>
